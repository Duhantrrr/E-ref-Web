<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eşref Usta | Premium QR Menü</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #e67e22; --bg: #f8f9fa; --card: #ffffff; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        
        /* ÜST BANNER */
        .hero { 
            height: 250px; 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1501443762994-82bd5dace89a?w=1000'); 
            background-size: cover; background-position: center; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: #fff; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
        }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 42px; margin: 0; }

        /* KATEGORİLER */
        .categories { display: flex; gap: 10px; padding: 20px; overflow-x: auto; position: sticky; top: 0; background: var(--bg); z-index: 100; scrollbar-width: none; }
        .cat-btn { background: #fff; border: 1px solid #eee; padding: 10px 22px; border-radius: 30px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .cat-btn.active { background: var(--p); color: #fff; border-color: var(--p); }

        /* ÜRÜN KARTLARI */
        .container { padding: 0 20px; max-width: 650px; margin: auto; }
        .card { background: var(--card); border-radius: 20px; padding: 12px; display: flex; align-items: center; gap: 15px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card img { width: 85px; height: 85px; border-radius: 15px; object-fit: cover; }
        .info { flex: 1; }
        .price { font-weight: 800; color: #27ae60; font-size: 19px; }

        /* ÇEŞİTLER BUTONU */
        .flavor-link { color: var(--p); font-size: 12px; font-weight: 700; text-decoration: none; display: inline-block; margin-top: 5px; cursor: pointer; border: 1px solid var(--p); padding: 4px 10px; border-radius: 20px; transition: 0.3s; }
        .flavor-link:hover { background: var(--p); color: white; }

        /* MODAL (KART AÇILIŞI) */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .modal-card { background: white; width: 100%; max-width: 450px; max-height: 80vh; border-radius: 30px; padding: 25px; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 15px; font-size: 24px; color: #333; cursor: pointer; }
        .modal-title { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--p); margin-bottom: 20px; text-align: center; border-bottom: 2px solid #f8f8f8; padding-bottom: 10px; }
        
        .flavor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .flavor-item { background: #fef9f5; padding: 10px; border-radius: 12px; font-size: 13px; font-weight: 600; color: #555; display: flex; align-items: center; gap: 8px; border-left: 4px solid var(--p); }

        footer { text-align: center; padding: 40px; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Eşref Usta</h1>
        <p>GELENEKSEL LEZZETLER</p>
    </div>

    <div class="categories" id="catBar"></div>
    <div class="container" id="menuArea"></div>

    <!-- DONDURMA ÇEŞİTLERİ KARTI (MODAL) -->
    <div class="modal" id="flavorModal" onclick="closeFlavors(event)">
        <div class="modal-card" onclick="event.stopPropagation()">
            <i class="fa-solid fa-xmark close-modal" onclick="document.getElementById('flavorModal').style.display='none'"></i>
            <div class="modal-title">Dondurma Çeşitlerimiz</div>
            <div class="flavor-grid" id="flavorList">
                <!-- Çeşitler JS ile dolacak -->
            </div>
        </div>
    </div>

    <footer>
        <a href="admin.html" style="color:#eee;"><i class="fa-solid fa-lock"></i></a>
    </footer>

    <script>
        const BASE_URL = "https://e-ref-api.onrender.com"; 
        
        // TABELADAKİ TÜM ÇEŞİTLER
        const dondurmaCesitleri = [
            "Eşref Usta Sadesi", "Sade", "Kakao", "Limon", "Çilek", "Karamel", 
            "Kavun", "Aronia", "Şeftali", "Böğürtlen", "İncir", "Ceviz", 
            "Yoğurtlu Meyveli", "Antep Fıstığı", "Vişne", "Oreo", "Karpuz", 
            "Ballı Muz", "Ballı Badem", "Damla Sakızı", "Yeşil Elma", 
            "Karadut", "Big Bubble", "Kivi", "Mango", "Orman Meyveli"
        ];

        let menuData = [];

        async function fetchMenu() {
            try {
                const res = await fetch(`${BASE_URL}/api/urunler`);
                menuData = await res.json();
                renderMenu('Tümü');
                renderCats();
            } catch (err) { console.log("Hata!"); }
        }

        function renderMenu(cat) {
            const area = document.getElementById('menuArea');
            area.innerHTML = '';
            const filtered = cat === 'Tümü' ? menuData : menuData.filter(i => i.kategori === cat);
            
            filtered.forEach(i => {
                // Eğer ürün dondurma ise altına "Çeşitleri Gör" butonu ekle
                const isDondurma = i.kategori === 'Dondurma';
                const flavorBtn = isDondurma ? `<div class="flavor-link" onclick="openFlavors()">🍦 Çeşitleri Gör</div>` : '';

                area.innerHTML += `
                <div class="card">
                    <img src="${i.img}" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="info">
                        <h3>${i.ad}</h3>
                        <small>${i.kategori}</small><br>
                        ${flavorBtn}
                    </div>
                    <div class="price">${i.fiyat} ₺</div>
                </div>`;
            });
        }

        function renderCats() {
            const cats = ['Tümü', ...new Set(menuData.map(i => i.kategori))];
            const bar = document.getElementById('catBar');
            bar.innerHTML = '';
            cats.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'cat-btn' + (c === 'Tümü' ? ' active' : '');
                btn.innerText = c;
                btn.onclick = (e) => {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    renderMenu(c);
                };
                bar.appendChild(btn);
            });
        }

        // ÇEŞİTLER KARTINI AÇ
        function openFlavors() {
            const list = document.getElementById('flavorList');
            list.innerHTML = '';
            dondurmaCesitleri.forEach(flavor => {
                list.innerHTML += `<div class="flavor-item"><i class="fa-solid fa-ice-cream" style="color:var(--p)"></i> ${flavor}</div>`;
            });
            document.getElementById('flavorModal').style.display = 'flex';
        }

        function closeFlavors(e) {
            document.getElementById('flavorModal').style.display = 'none';
        }

        fetchMenu();
    </script>
</body>
</html>

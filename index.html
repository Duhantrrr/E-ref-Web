<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eşref Usta | QR Menü</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #e67e22; --bg: #f8f9fa; --card: #ffffff; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        .hero { 
            height: 250px; 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1501443762994-82bd5dace89a?w=1000'); 
            background-size: cover; background-position: center; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: #fff; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
        }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 42px; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .hero p { font-size: 14px; letter-spacing: 4px; text-transform: uppercase; margin-top: 5px; opacity: 0.9; }

        .categories { 
            display: flex; gap: 10px; padding: 25px 20px; overflow-x: auto; 
            position: sticky; top: 0; background: var(--bg); z-index: 100; scrollbar-width: none; 
        }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn { 
            background: #fff; border: 1px solid #eee; padding: 12px 25px; 
            border-radius: 30px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.3s;
        }
        .cat-btn.active { background: var(--p); color: #fff; border-color: var(--p); box-shadow: 0 8px 20px rgba(230, 126, 34, 0.3); }

        .container { padding: 0 20px; max-width: 650px; margin: auto; }
        .card { 
            background: var(--card); border-radius: 20px; padding: 12px; 
            display: flex; align-items: center; gap: 15px; margin-bottom: 18px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); animation: slideIn 0.5s ease forwards;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .card img { width: 90px; height: 90px; border-radius: 16px; object-fit: cover; background: #eee; }
        .info { flex: 1; }
        .info h3 { margin: 0; font-size: 18px; font-weight: 700; color: #333; }
        .info small { color: var(--p); font-weight: 600; text-transform: uppercase; font-size: 11px; }
        .price { font-weight: 800; color: #27ae60; font-size: 20px; }

        footer { text-align: center; padding: 40px; }
        .lock-btn { color: #eee; text-decoration: none; font-size: 18px; transition: 0.3s; }
        .lock-btn:hover { color: var(--p); }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Eşref Usta</h1>
        <p>Geleneksel Lezzetler</p>
    </div>

    <div class="categories" id="catBar">
        <button class="cat-btn active" onclick="filterMenu('Tümü', this)">Tümü</button>
    </div>

    <div class="container" id="menuArea">
        <p style="text-align:center; margin-top:50px;">Lezzetler hazırlanıyor...</p>
    </div>

    <footer>
        <a href="admin.html" class="lock-btn"><i class="fa-solid fa-lock"></i></a>
    </footer>

    <script>
        const BASE_URL = "https://e-ref-api.onrender.com"; 
        let menuData = [];

        async function fetchMenu() {
            try {
                const res = await fetch(`${BASE_URL}/api/urunler`);
                menuData = await res.json();
                renderMenu('Tümü');
                renderCats();
            } catch (err) {
                document.getElementById('menuArea').innerHTML = "<p style='text-align:center;'>Sunucuya bağlanılamadı. API'nin uyanması 30sn sürebilir...</p>";
            }
        }

        function renderMenu(cat) {
            const area = document.getElementById('menuArea');
            area.innerHTML = '';
            const filtered = cat === 'Tümü' ? menuData : menuData.filter(i => i.kategori === cat);
            
            if(filtered.length === 0) area.innerHTML = "<p style='text-align:center;'>Bu kategoride henüz ürün yok.</p>";

            filtered.forEach(i => {
                const imgSource = i.img || "https://via.placeholder.com/150?text=Esref+Usta";
                area.innerHTML += `
                <div class="card">
                    <img src="${imgSource}" onerror="this.src='https://via.placeholder.com/150?text=Lezzet'">
                    <div class="info">
                        <small>${i.kategori || "Genel"}</small>
                        <h3>${i.ad || "İsimsiz Ürün"}</h3>
                    </div>
                    <div class="price">${i.fiyat || "0"} ₺</div>
                </div>`;
            });
        }

        function renderCats() {
            const cats = ['Tümü', ...new Set(menuData.map(i => i.kategori))];
            const bar = document.getElementById('catBar');
            bar.innerHTML = '';
            cats.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'cat-btn' + (c === 'Tümü' ? ' active' : '');
                btn.innerText = c;
                btn.onclick = (e) => {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    renderMenu(c);
                };
                bar.appendChild(btn);
            });
        }

        fetchMenu();
    </script>
</body>
</html>
